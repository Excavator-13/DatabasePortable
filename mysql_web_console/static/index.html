<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySQL Web Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body class="bg-gray-900 text-gray-100 min-h-screen font-mono">
    <div id="app" class="max-w-3xl mx-auto px-4 py-6">
      <div
        v-if="loginView"
        class="flex items-center justify-center min-h-[80vh]"
      >
        <div class="w-full max-w-sm">
          <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400 tracking-wide">
              MySQL Web Console
            </h1>
            <p class="text-sm text-gray-500 mt-2">请输入数据库连接信息</p>
          </div>
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg p-5 space-y-4"
          >
            <div>
              <label class="block text-xs text-gray-400 mb-1">Host</label>
              <input
                v-model="loginHost"
                placeholder="127.0.0.1"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Port</label>
              <input
                v-model="loginPort"
                inputmode="numeric"
                placeholder="3306"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">User</label>
              <input
                v-model="loginUser"
                placeholder="root"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Password</label>
              <div class="relative">
                <input
                  v-model="loginPassword"
                  :type="showPassword ? 'text' : 'password'"
                  placeholder="数据库密码"
                  @keydown.enter="doLogin"
                  class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 pr-10 text-sm outline-none focus:border-blue-500 transition-colors"
                  style="min-height: 44px"
                />
                <button
                  @click="showPassword = !showPassword"
                  @mousedown.prevent
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 p-1"
                >
                  <svg
                    v-if="!showPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    ></path>
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    ></path>
                  </svg>
                  <svg
                    v-else
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    ></path>
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Database</label>
              <input
                v-model="loginDb"
                placeholder="数据库名"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input
                type="checkbox"
                v-model="rememberLogin"
                class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0"
              />
              <span class="text-sm text-gray-300">记住登录</span>
            </label>
            <div
              v-if="loginError"
              class="bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-lg px-3 py-2"
            >
              {{ loginError }}
            </div>
            <button
              @click="doLogin"
              @mousedown.prevent
              :disabled="loginLoading"
              class="w-full py-3 text-lg rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
              :class="loginLoading ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
            >
              <svg
                v-if="loginLoading"
                class="animate-spin h-5 w-5 text-white"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                ></path>
              </svg>
              {{ loginLoading ? '连接中...' : '登录' }}
            </button>
          </div>
          <p class="text-center text-xs text-gray-600 mt-4">
            凭据仅用于直连 MySQL，不经过第三方
          </p>
        </div>
      </div>

      <template v-if="!loginView">
        <header class="mb-6">
          <div class="flex items-center justify-between">
            <div>
              <h1 class="text-xl font-bold text-blue-400 tracking-wide">
                MySQL Web Console
              </h1>
              <p class="text-sm text-gray-500 mt-1">局域网移动端 SQL 控制台</p>
            </div>
            <div
              v-if="currentDb"
              class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm"
            >
              <span class="text-gray-400">DB:</span>
              <span class="text-emerald-400 font-semibold ml-1"
                >{{ currentDb }}</span
              >
            </div>
          </div>
        </header>

        <section class="mb-4">
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden"
            style="height: 200px"
          >
            <div
              v-if="tablesLoading"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              <svg
                class="animate-spin h-5 w-5 mr-2"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                ></path>
              </svg>
              加载中...
            </div>
            <div
              v-else-if="!currentDb"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              未连接数据库
            </div>
            <div
              v-else-if="tableList.length === 0 && !tablesLoading"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              当前数据库无表
            </div>
            <template v-else-if="tableListView === 'list'">
              <div
                class="h-full overflow-y-auto"
                style="-webkit-overflow-scrolling: touch"
              >
                <div
                  v-for="t in tableList"
                  :key="t"
                  @click="openTableDetail(t)"
                  class="flex items-center justify-between px-4 hover:bg-gray-700 transition-colors cursor-pointer border-b border-gray-700/50 last:border-b-0"
                  style="min-height: 44px"
                >
                  <span class="text-sm text-emerald-400 font-medium truncate"
                    >{{ t }}</span
                  >
                  <svg
                    class="w-4 h-4 text-gray-500 shrink-0 ml-2"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5l7 7-7 7"
                    ></path>
                  </svg>
                </div>
              </div>
            </template>
            <template v-else-if="tableListView === 'detail'">
              <div class="flex flex-col h-full">
                <div
                  class="flex items-center px-3 py-1.5 border-b border-gray-700/50 shrink-0"
                >
                  <button
                    @click="tableListView = 'list'"
                    @mousedown.prevent
                    class="bg-gray-700 hover:bg-gray-600 text-xs px-2 py-1 rounded transition-colors inline-flex items-center gap-1 shrink-0"
                  >
                    ← 返回
                  </button>
                  <span
                    class="text-sm text-emerald-400 font-semibold truncate ml-2"
                    >{{ selectedTable }}</span
                  >
                </div>
                <div
                  class="flex items-center gap-1.5 px-3 py-1.5 border-b border-gray-700 shrink-0"
                >
                  <button
                    @click="fillSelect"
                    @mousedown.prevent
                    class="bg-blue-800 hover:bg-blue-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    SELECT
                  </button>
                  <button
                    @click="fillInsert"
                    @mousedown.prevent
                    class="bg-green-800 hover:bg-green-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    INSERT
                  </button>
                  <button
                    @click="fillUpdate"
                    @mousedown.prevent
                    class="bg-yellow-800 hover:bg-yellow-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    UPDATE
                  </button>
                  <button
                    @click="fillDelete"
                    @mousedown.prevent
                    class="bg-red-800 hover:bg-red-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    DELETE
                  </button>
                </div>
                <div
                  class="flex-1 overflow-y-auto"
                  style="-webkit-overflow-scrolling: touch"
                >
                  <div
                    v-if="tableDetailLoading"
                    class="flex items-center justify-center py-6 text-gray-500 text-sm"
                  >
                    <svg
                      class="animate-spin h-4 w-4 mr-2"
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <circle
                        class="opacity-25"
                        cx="12"
                        cy="12"
                        r="10"
                        stroke="currentColor"
                        stroke-width="4"
                      ></circle>
                      <path
                        class="opacity-75"
                        fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                      ></path>
                    </svg>
                    加载中...
                  </div>
                  <table
                    v-else-if="tableDetailColumns.length > 0"
                    class="w-full text-xs"
                  >
                    <thead>
                      <tr class="bg-gray-700/60">
                        <th
                          v-for="col in tableDetailColumns"
                          :key="col"
                          class="px-3 py-1.5 text-left font-bold whitespace-nowrap text-gray-300"
                        >
                          {{ col }}
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr
                        v-for="(row, idx) in tableDetailRows"
                        :key="idx"
                        :class="idx % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                      >
                        <td
                          v-for="(cell, ci) in row"
                          :key="ci"
                          class="px-3 py-1 whitespace-nowrap"
                        >
                          <span
                            v-if="cell === null"
                            class="text-gray-500 italic"
                            >NULL</span
                          >
                          <span v-else class="text-gray-300">{{ cell }}</span>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </template>
          </div>
        </section>

        <section class="mb-4">
          <div class="flex flex-wrap gap-2 mb-3">
            <button
              @click="openPicker"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors inline-flex items-center gap-1 focus:outline-none"
            >
              <span>📋 收藏 / PROC</span>
            </button>
          </div>

          <div
            v-if="pickerView"
            class="fixed inset-0 bg-gray-900 z-40 flex flex-col overflow-hidden"
            style="overscroll-behavior: contain"
          >
            <div
              class="flex items-center px-4 py-3 border-b border-gray-700 shrink-0"
            >
              <button
                @click="closePicker"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                ← 返回
              </button>
              <span class="text-base font-semibold text-gray-200 ml-3"
                >收藏 &amp; Procedure</span
              >
            </div>

            <div class="flex flex-col flex-1 min-h-0">
              <div
                class="flex flex-col min-h-0 border-b-2 border-gray-500"
                :style="{ flex: pickerFavFlex }"
              >
                <div
                  class="flex items-center justify-between px-4 py-2 shrink-0"
                >
                  <span class="text-sm font-semibold text-yellow-300"
                    >⭐ 收藏
                    <span class="text-gray-500 font-normal"
                      >({{ filteredFavorites.length }})</span
                    ></span
                  >
                </div>
                <div class="px-4 pb-2 shrink-0">
                  <input
                    v-model="favSearch"
                    ref="pickerFavSearchRef"
                    placeholder="搜索收藏..."
                    class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm w-full outline-none focus:border-blue-500"
                  />
                </div>
                <div
                  class="flex-1 overflow-y-scroll min-h-0"
                  style="
                    -webkit-overflow-scrolling: touch;
                    overscroll-behavior-y: contain;
                  "
                >
                  <div
                    v-for="fav in filteredFavorites"
                    :key="fav.id"
                    class="flex items-center justify-between px-4 py-2 text-sm hover:bg-gray-800 transition-colors border-b border-gray-700/50 last:border-b-0"
                    style="min-height: 44px"
                  >
                    <div
                      @click="sql = fav.sql; closePicker()"
                      class="cursor-pointer flex-1 mr-2 min-w-0"
                    >
                      <div class="text-yellow-300 truncate font-medium">
                        {{ fav.name }}
                      </div>
                      <div class="text-gray-500 truncate text-xs mt-0.5">
                        {{ fav.sql }}
                      </div>
                    </div>
                    <button
                      @click.stop="removeFavorite(fav.id)"
                      @mousedown.prevent
                      class="text-gray-500 hover:text-red-400 hover:bg-red-900/30 transition-colors shrink-0 ml-2 w-8 h-8 flex items-center justify-center rounded"
                      title="删除收藏"
                    >
                      ✕
                    </button>
                  </div>
                  <div
                    v-if="filteredFavorites.length === 0 && favorites.length > 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    无匹配结果
                  </div>
                  <div
                    v-if="favorites.length === 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    暂无收藏，点击 ⭐ 收藏 SQL
                  </div>
                </div>
              </div>

              <div
                class="flex flex-col min-h-0"
                :style="{ flex: pickerProcFlex }"
              >
                <div
                  class="flex items-center justify-between px-4 py-2 shrink-0"
                >
                  <span class="text-sm font-semibold text-emerald-400"
                    >CALL PROC
                    <span class="text-gray-500 font-normal"
                      >({{ filteredProcList.length }})</span
                    ></span
                  >
                </div>
                <div class="px-4 pb-2 shrink-0">
                  <input
                    v-model="procSearch"
                    placeholder="搜索 Procedure..."
                    class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm w-full outline-none focus:border-blue-500"
                  />
                </div>
                <div
                  class="flex-1 overflow-y-scroll min-h-0"
                  style="
                    -webkit-overflow-scrolling: touch;
                    overscroll-behavior-y: contain;
                  "
                >
                  <div
                    v-for="name in filteredProcList"
                    :key="name"
                    @click="selectProcedureFromPicker(name)"
                    class="px-4 py-2 text-sm hover:bg-gray-800 transition-colors truncate border-b border-gray-700/50 last:border-b-0 cursor-pointer"
                    style="min-height: 44px"
                  >
                    {{ name }}
                  </div>
                  <div
                    v-if="filteredProcList.length === 0 && procList.length > 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    无匹配结果
                  </div>
                  <div
                    v-if="procList.length === 0 && !procLoading"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    当前数据库无 Procedure
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div
            v-if="favNameDialog"
            class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
            @click.self="favNameDialog = false"
          >
            <div
              class="bg-gray-800 border border-gray-700 rounded-lg p-4 w-80 shadow-xl"
              @click.stop
            >
              <div class="text-sm font-semibold text-gray-200 mb-3">
                ⭐ 收藏 SQL
              </div>
              <input
                v-model="favNameInput"
                ref="favNameInputRef"
                @keydown.enter="confirmFavorite"
                @keydown.escape="favNameDialog = false"
                placeholder="输入收藏命名..."
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-blue-500 mb-3"
              />
              <div class="text-gray-500 text-xs mb-3 truncate">
                SQL: {{ favPendingSql }}
              </div>
              <div
                v-if="favValidationError"
                class="bg-yellow-900/40 border border-yellow-700/60 text-yellow-300 text-xs rounded px-3 py-2 mb-3 break-all"
              >
                <span class="font-semibold">⚠ 校验未通过：</span>{{
                favValidationError }}
              </div>
              <div class="flex gap-2 justify-end">
                <button
                  @click="favNameDialog = false"
                  @mousedown.prevent
                  class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded transition-colors"
                >
                  取消
                </button>
                <button
                  v-if="favValidationError"
                  @click="confirmFavorite(true)"
                  @mousedown.prevent
                  :disabled="favLoading || !favNameInput.trim()"
                  class="text-sm px-3 py-1.5 rounded transition-colors"
                  :class="favLoading || !favNameInput.trim() ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-yellow-600 hover:bg-yellow-500 text-white'"
                >
                  {{ favLoading ? '收藏中...' : '仍然收藏' }}
                </button>
                <button
                  v-else
                  @click="confirmFavorite(false)"
                  @mousedown.prevent
                  :disabled="favLoading || !favNameInput.trim()"
                  class="text-sm px-3 py-1.5 rounded transition-colors"
                  :class="favLoading || !favNameInput.trim() ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
                >
                  {{ favLoading ? '收藏中...' : '确认收藏' }}
                </button>
              </div>
            </div>
          </div>

          <div class="flex flex-wrap gap-2 mb-3">
            <button
              @click="insertTab"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors"
              title="在光标处插入缩进"
            >
              ⇥ Tab
            </button>
            <button
              @click="insertQuote"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors"
              title="在光标处插入引号"
            >
              ' '
            </button>
            <button
              @click="clearSql"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors focus:outline-none ml-auto"
              title="清空输入框"
            >
              ✕ 清空
            </button>
          </div>

          <div class="relative">
            <textarea
              v-model="sql"
              rows="4"
              placeholder="输入 SQL 语句..."
              class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 pr-10 font-mono text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-y transition-colors"
              @keydown="onKeydown"
            ></textarea>
            <button
              @click="handleFavorite"
              @mousedown.prevent
              :disabled="favLoading"
              class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center rounded transition-colors z-10"
              :class="favLoading ? 'text-yellow-400 animate-pulse' : 'text-gray-500 hover:text-yellow-400 hover:bg-gray-700'"
              title="收藏当前 SQL"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
                />
              </svg>
            </button>
          </div>
        </section>

        <section class="mb-6">
          <button
            @click="executeSql"
            @mousedown.prevent
            :disabled="loading"
            class="w-full py-3 text-lg rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
            :class="loading ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
          >
            <svg
              v-if="loading"
              class="animate-spin h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
            {{ loading ? '执行中...' : '执行' }}
          </button>
        </section>

        <section id="output-area" v-if="result">
          <div
            class="rounded-lg px-4 py-3 mb-4 text-sm"
            :class="result.success
          ? 'bg-green-900/50 border border-green-700 text-green-300'
          : 'bg-red-900/50 border border-red-700 text-red-300'"
          >
            <template v-if="result.success">
              <template
                v-if="result.columns && result.columns.length > 0 && result.out_params && result.out_params.length > 0"
              >
                查询成功，共返回 {{ result.rows.length }} 行，{{
                result.out_params.length }} 个 OUT 参数，耗时 {{
                result.duration_ms }} ms
              </template>
              <template v-else-if="result.columns && result.columns.length > 0">
                查询成功，耗时 {{ result.duration_ms }} ms，共 {{
                result.rows.length }} 行
              </template>
              <template
                v-else-if="result.out_params && result.out_params.length > 0"
              >
                执行成功，返回 {{ result.out_params.length }} 个 OUT 参数，耗时
                {{ result.duration_ms }} ms
              </template>
              <template v-else>
                执行成功，影响 {{ result.affected_rows }} 行，耗时 {{
                result.duration_ms }} ms
              </template>
            </template>
            <template v-else> {{ result.message }} </template>
          </div>

          <div
            v-if="result.success && result.affected_rows > 0 && (!result.columns || result.columns.length === 0)"
            class="text-yellow-400 font-semibold mb-4 text-sm"
          >
            影响行数：{{ result.affected_rows }} 行
          </div>

          <div
            v-if="result.columns && result.columns.length > 0"
            class="overflow-x-auto rounded-lg border border-gray-700 max-h-[60vh] overflow-y-auto"
          >
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-700">
                  <th
                    v-for="col in result.columns"
                    :key="col"
                    class="px-4 py-2 text-left font-bold whitespace-nowrap text-gray-200"
                  >
                    {{ col }}
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr
                  v-for="(row, index) in result.rows"
                  :key="index"
                  :class="index % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                >
                  <td
                    v-for="(cell, ci) in row"
                    :key="ci"
                    class="px-4 py-2 whitespace-nowrap"
                  >
                    <span v-if="cell === null" class="text-gray-500 italic"
                      >NULL</span
                    >
                    <span v-else>{{ cell }}</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div
            v-if="result.columns && result.columns.length > 0"
            class="flex gap-2 mt-2"
          >
            <button
              @click="copyAsMarkdown(result.columns, result.rows)"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
            >
              📋 复制 Markdown
            </button>
            <button
              @click="downloadCsv(result.columns, result.rows, 'query_result.csv')"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
            >
              ⬇️ 下载 CSV
            </button>
          </div>

          <div
            v-if="result.out_params && result.out_params.length > 0"
            class="mt-4"
          >
            <div class="text-sm font-semibold text-amber-400 mb-2">
              OUT 参数
            </div>
            <div class="overflow-x-auto rounded-lg border border-amber-800/50">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-amber-900/30">
                    <th
                      class="px-4 py-2 text-left font-bold whitespace-nowrap text-amber-300"
                    >
                      参数名
                    </th>
                    <th
                      class="px-4 py-2 text-left font-bold whitespace-nowrap text-amber-300"
                    >
                      值
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    v-for="(param, index) in result.out_params"
                    :key="index"
                    :class="index % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                  >
                    <td class="px-4 py-2 whitespace-nowrap text-amber-200">
                      {{ param.name }}
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap">
                      <span
                        v-if="param.value === null"
                        class="text-gray-500 italic"
                        >NULL</span
                      >
                      <span v-else>{{ param.value }}</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="flex gap-2 mt-2">
              <button
                @click="copyAsMarkdown(['参数名', '值'], result.out_params.map(p => [p.name, p.value]))"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                📋 复制 Markdown
              </button>
              <button
                @click="downloadCsv(['参数名', '值'], result.out_params.map(p => [p.name, p.value]), 'out_params.csv')"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                ⬇️ 下载 CSV
              </button>
            </div>
          </div>
        </section>

        <section class="mt-6">
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden"
          >
            <div
              @click="randOpen = !randOpen"
              class="text-sm font-semibold text-gray-300 px-4 py-3 cursor-pointer select-none hover:bg-gray-700/50 transition-colors flex items-center justify-between"
            >
              <span>🎲 随机数生成器</span>
              <svg
                class="w-3 h-3 transition-transform"
                :class="{ 'rotate-180': randOpen }"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
            <div v-show="randOpen">
              <div class="flex gap-2 px-4 pb-3">
                <input
                  v-model="randMax"
                  type="number"
                  min="2"
                  placeholder="输入大于1的整数"
                  @keydown.enter="generateRandom"
                  class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors"
                />
                <button
                  @click="generateRandom"
                  @mousedown.prevent
                  class="bg-emerald-600 hover:bg-emerald-500 text-sm px-4 py-2 rounded font-semibold transition-colors whitespace-nowrap"
                >
                  生成
                </button>
              </div>
              <div v-if="randError" class="text-red-400 text-xs px-4 pb-2">
                {{ randError }}
              </div>
              <div v-if="randResult !== null">
                <div
                  class="text-center text-4xl font-bold text-emerald-400 py-4"
                >
                  {{ randResult }}
                </div>
                <div class="text-center text-xs text-gray-500 pb-3">
                  1 ~ {{ randMax }} 范围内的随机数
                </div>
              </div>
            </div>
          </div>
        </section>

        <div
          v-if="copyToast"
          class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50"
        >
          {{ copyToast }}
        </div>

        <div
          v-if="favToast"
          class="fixed bottom-4 left-1/2 -translate-x-1/2 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50"
          :class="{
          'bg-emerald-600': favToast.type === 'success',
          'bg-red-600': favToast.type === 'error',
          'bg-yellow-600': favToast.type === 'warn',
        }"
        >
          {{ favToast.text }}
        </div>

        <button
          v-if="isLoginMode"
          @click="doLogout"
          @mousedown.prevent
          class="fixed bottom-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 border border-gray-700 text-gray-500 hover:text-red-400 hover:border-red-700 transition-colors shadow-lg z-40"
          title="退出登录"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
        </button>
      </template>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
