<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySQL Web Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body class="bg-gray-900 text-gray-100 min-h-screen font-mono">
    <div id="app" class="max-w-3xl mx-auto px-4 py-6">
      <div
        v-if="loginView"
        class="flex items-center justify-center min-h-[80vh]"
      >
        <div class="w-full max-w-sm">
          <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400 tracking-wide">
              MySQL Web Console
            </h1>
            <p class="text-sm text-gray-500 mt-2">请输入数据库连接信息</p>
          </div>
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg p-5 space-y-4"
          >
            <div>
              <label class="block text-xs text-gray-400 mb-1">Host</label>
              <input
                v-model="loginHost"
                placeholder="127.0.0.1"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Port</label>
              <input
                v-model="loginPort"
                inputmode="numeric"
                placeholder="3306"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">User</label>
              <input
                v-model="loginUser"
                placeholder="root"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Password</label>
              <div class="relative">
                <input
                  v-model="loginPassword"
                  :type="showPassword ? 'text' : 'password'"
                  placeholder="数据库密码"
                  @keydown.enter="doLogin"
                  class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 pr-10 text-sm outline-none focus:border-blue-500 transition-colors"
                  style="min-height: 44px"
                />
                <button
                  @click="showPassword = !showPassword"
                  @mousedown.prevent
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 p-1"
                >
                  <svg
                    v-if="!showPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    ></path>
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    ></path>
                  </svg>
                  <svg
                    v-else
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    ></path>
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">Database</label>
              <input
                v-model="loginDb"
                placeholder="数据库名"
                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 transition-colors"
                style="min-height: 44px"
              />
            </div>
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input
                type="checkbox"
                v-model="rememberLogin"
                class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-0"
              />
              <span class="text-sm text-gray-300">记住登录</span>
            </label>
            <div
              v-if="loginError"
              class="bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-lg px-3 py-2"
            >
              {{ loginError }}
            </div>
            <button
              @click="doLogin"
              @mousedown.prevent
              :disabled="loginLoading"
              class="w-full py-3 text-lg rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
              :class="loginLoading ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
            >
              <svg
                v-if="loginLoading"
                class="animate-spin h-5 w-5 text-white"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                ></path>
              </svg>
              {{ loginLoading ? '连接中...' : '登录' }}
            </button>
          </div>
          <p class="text-center text-xs text-gray-600 mt-4">
            凭据仅用于直连 MySQL，不经过第三方
          </p>
        </div>
      </div>

      <template v-if="!loginView">
        <header class="mb-6">
          <div class="flex items-center justify-between">
            <div>
              <h1 class="text-xl font-bold text-blue-400 tracking-wide">
                MySQL Web Console
              </h1>
              <p class="text-sm text-gray-500 mt-1">局域网移动端 SQL 控制台</p>
            </div>
            <div
              v-if="currentDb"
              class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm"
            >
              <span class="text-gray-400">DB:</span>
              <span class="text-emerald-400 font-semibold ml-1"
                >{{ currentDb }}</span
              >
            </div>
          </div>
        </header>

        <section class="mb-4">
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden"
            style="height: 200px"
          >
            <div
              v-if="tablesLoading"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              <svg
                class="animate-spin h-5 w-5 mr-2"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                ></path>
              </svg>
              加载中...
            </div>
            <div
              v-else-if="!currentDb"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              未连接数据库
            </div>
            <div
              v-else-if="tableList.length === 0 && !tablesLoading"
              class="flex items-center justify-center h-full text-gray-500 text-sm"
            >
              当前数据库无表
            </div>
            <template v-else-if="tableListView === 'list'">
              <div
                class="h-full overflow-y-auto"
                style="-webkit-overflow-scrolling: touch"
              >
                <div
                  v-for="t in tableList"
                  :key="t"
                  @click="openTableDetail(t)"
                  class="flex items-center justify-between px-4 hover:bg-gray-700 transition-colors cursor-pointer border-b border-gray-700/50 last:border-b-0"
                  style="min-height: 44px"
                >
                  <span class="text-sm text-emerald-400 font-medium truncate"
                    >{{ t }}</span
                  >
                  <svg
                    class="w-4 h-4 text-gray-500 shrink-0 ml-2"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5l7 7-7 7"
                    ></path>
                  </svg>
                </div>
              </div>
            </template>
            <template v-else-if="tableListView === 'detail'">
              <div class="flex flex-col h-full">
                <div
                  class="flex items-center px-3 py-1.5 border-b border-gray-700/50 shrink-0"
                >
                  <button
                    @click="tableListView = 'list'"
                    @mousedown.prevent
                    class="bg-gray-700 hover:bg-gray-600 text-xs px-2 py-1 rounded transition-colors inline-flex items-center gap-1 shrink-0"
                  >
                    ← 返回
                  </button>
                  <span
                    class="text-sm text-emerald-400 font-semibold truncate ml-2"
                    >{{ selectedTable }}</span
                  >
                </div>
                <div
                  class="flex items-center gap-1.5 px-3 py-1.5 border-b border-gray-700 shrink-0"
                >
                  <button
                    @click="fillSelect"
                    @mousedown.prevent
                    class="bg-blue-800 hover:bg-blue-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    SELECT
                  </button>
                  <button
                    @click="fillInsert"
                    @mousedown.prevent
                    class="bg-green-800 hover:bg-green-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    INSERT
                  </button>
                  <button
                    @click="fillUpdate"
                    @mousedown.prevent
                    class="bg-yellow-800 hover:bg-yellow-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    UPDATE
                  </button>
                  <button
                    @click="fillDelete"
                    @mousedown.prevent
                    class="bg-red-800 hover:bg-red-700 text-xs px-2.5 py-1.5 rounded transition-colors flex-1"
                  >
                    DELETE
                  </button>
                </div>
                <div
                  class="flex-1 overflow-y-auto"
                  style="-webkit-overflow-scrolling: touch"
                >
                  <div
                    v-if="tableDetailLoading"
                    class="flex items-center justify-center py-6 text-gray-500 text-sm"
                  >
                    <svg
                      class="animate-spin h-4 w-4 mr-2"
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <circle
                        class="opacity-25"
                        cx="12"
                        cy="12"
                        r="10"
                        stroke="currentColor"
                        stroke-width="4"
                      ></circle>
                      <path
                        class="opacity-75"
                        fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                      ></path>
                    </svg>
                    加载中...
                  </div>
                  <table
                    v-else-if="tableDetailColumns.length > 0"
                    class="w-full text-xs"
                  >
                    <thead>
                      <tr class="bg-gray-700/60">
                        <th
                          v-for="col in tableDetailColumns"
                          :key="col"
                          class="px-3 py-1.5 text-left font-bold whitespace-nowrap text-gray-300"
                        >
                          {{ col }}
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr
                        v-for="(row, idx) in tableDetailRows"
                        :key="idx"
                        :class="idx % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                      >
                        <td
                          v-for="(cell, ci) in row"
                          :key="ci"
                          class="px-3 py-1 whitespace-nowrap"
                        >
                          <span
                            v-if="cell === null"
                            class="text-gray-500 italic"
                            >NULL</span
                          >
                          <span v-else class="text-gray-300">{{ cell }}</span>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </template>
          </div>
        </section>

        <section class="mb-4">
          <div class="flex flex-wrap gap-2 mb-3">
            <button
              @click="openPicker"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors inline-flex items-center gap-1 focus:outline-none"
            >
              <span>📋 收藏 / PROC</span>
            </button>
          </div>

          <div
            v-if="pickerView"
            class="fixed inset-0 bg-gray-900 z-40 flex flex-col overflow-hidden"
            style="overscroll-behavior: contain"
          >
            <div
              class="flex items-center px-4 py-3 border-b border-gray-700 shrink-0"
            >
              <button
                @click="closePicker"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                ← 返回
              </button>
              <span class="text-base font-semibold text-gray-200 ml-3"
                >收藏 &amp; Procedure</span
              >
            </div>

            <div class="flex flex-col flex-1 min-h-0">
              <div
                class="flex flex-col min-h-0 border-b-2 border-gray-500"
                :style="{ flex: pickerFavFlex }"
              >
                <div
                  class="flex items-center justify-between px-4 py-2 shrink-0"
                >
                  <span class="text-sm font-semibold text-yellow-300"
                    >⭐ 收藏
                    <span class="text-gray-500 font-normal"
                      >({{ filteredFavorites.length }})</span
                    ></span
                  >
                </div>
                <div class="px-4 pb-2 shrink-0">
                  <input
                    v-model="favSearch"
                    ref="pickerFavSearchRef"
                    placeholder="搜索收藏..."
                    class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm w-full outline-none focus:border-blue-500"
                  />
                </div>
                <div
                  class="flex-1 overflow-y-scroll min-h-0"
                  style="
                    -webkit-overflow-scrolling: touch;
                    overscroll-behavior-y: contain;
                  "
                >
                  <div
                    v-for="fav in filteredFavorites"
                    :key="fav.id"
                    class="flex items-center justify-between px-4 py-2 text-sm hover:bg-gray-800 transition-colors border-b border-gray-700/50 last:border-b-0"
                    style="min-height: 44px"
                  >
                    <div
                      @click="sql = fav.sql; closePicker()"
                      class="cursor-pointer flex-1 mr-2 min-w-0"
                    >
                      <div class="text-yellow-300 truncate font-medium">
                        {{ fav.name }}
                      </div>
                      <div class="text-gray-500 truncate text-xs mt-0.5">
                        {{ fav.sql }}
                      </div>
                    </div>
                    <button
                      @click.stop="removeFavorite(fav.id)"
                      @mousedown.prevent
                      class="text-gray-500 hover:text-red-400 hover:bg-red-900/30 transition-colors shrink-0 ml-2 w-8 h-8 flex items-center justify-center rounded"
                      title="删除收藏"
                    >
                      ✕
                    </button>
                  </div>
                  <div
                    v-if="filteredFavorites.length === 0 && favorites.length > 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    无匹配结果
                  </div>
                  <div
                    v-if="favorites.length === 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    暂无收藏，点击 ⭐ 收藏 SQL
                  </div>
                </div>
              </div>

              <div
                class="flex flex-col min-h-0"
                :style="{ flex: pickerProcFlex }"
              >
                <div
                  class="flex items-center justify-between px-4 py-2 shrink-0"
                >
                  <span class="text-sm font-semibold text-emerald-400"
                    >CALL PROC
                    <span class="text-gray-500 font-normal"
                      >({{ filteredProcList.length }})</span
                    ></span
                  >
                </div>
                <div class="px-4 pb-2 shrink-0">
                  <input
                    v-model="procSearch"
                    placeholder="搜索 Procedure..."
                    class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm w-full outline-none focus:border-blue-500"
                  />
                </div>
                <div
                  class="flex-1 overflow-y-scroll min-h-0"
                  style="
                    -webkit-overflow-scrolling: touch;
                    overscroll-behavior-y: contain;
                  "
                >
                  <div
                    v-for="name in filteredProcList"
                    :key="name"
                    @click="selectProcedureFromPicker(name)"
                    class="px-4 py-2 text-sm hover:bg-gray-800 transition-colors truncate border-b border-gray-700/50 last:border-b-0 cursor-pointer"
                    style="min-height: 44px"
                  >
                    {{ name }}
                  </div>
                  <div
                    v-if="filteredProcList.length === 0 && procList.length > 0"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    无匹配结果
                  </div>
                  <div
                    v-if="procList.length === 0 && !procLoading"
                    class="text-gray-500 text-sm px-4 py-3"
                  >
                    当前数据库无 Procedure
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div
            v-if="favNameDialog"
            class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
            @click.self="favNameDialog = false"
          >
            <div
              class="bg-gray-800 border border-gray-700 rounded-lg p-4 w-80 shadow-xl"
              @click.stop
            >
              <div class="text-sm font-semibold text-gray-200 mb-3">
                ⭐ 收藏 SQL
              </div>
              <input
                v-model="favNameInput"
                ref="favNameInputRef"
                @keydown.enter="confirmFavorite"
                @keydown.escape="favNameDialog = false"
                placeholder="输入收藏命名..."
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-blue-500 mb-3"
              />
              <div class="text-gray-500 text-xs mb-3 truncate">
                SQL: {{ favPendingSql }}
              </div>
              <div
                v-if="favValidationError"
                class="bg-yellow-900/40 border border-yellow-700/60 text-yellow-300 text-xs rounded px-3 py-2 mb-3 break-all"
              >
                <span class="font-semibold">⚠ 校验未通过：</span>{{
                favValidationError }}
              </div>
              <div class="flex gap-2 justify-end">
                <button
                  @click="favNameDialog = false"
                  @mousedown.prevent
                  class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded transition-colors"
                >
                  取消
                </button>
                <button
                  v-if="favValidationError"
                  @click="confirmFavorite(true)"
                  @mousedown.prevent
                  :disabled="favLoading || !favNameInput.trim()"
                  class="text-sm px-3 py-1.5 rounded transition-colors"
                  :class="favLoading || !favNameInput.trim() ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-yellow-600 hover:bg-yellow-500 text-white'"
                >
                  {{ favLoading ? '收藏中...' : '仍然收藏' }}
                </button>
                <button
                  v-else
                  @click="confirmFavorite(false)"
                  @mousedown.prevent
                  :disabled="favLoading || !favNameInput.trim()"
                  class="text-sm px-3 py-1.5 rounded transition-colors"
                  :class="favLoading || !favNameInput.trim() ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
                >
                  {{ favLoading ? '收藏中...' : '确认收藏' }}
                </button>
              </div>
            </div>
          </div>

          <div class="flex flex-wrap gap-2 mb-3">
            <button
              @click="insertTab"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors"
              title="在光标处插入缩进"
            >
              ⇥ Tab
            </button>
            <button
              @click="insertQuote"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors"
              title="在光标处插入引号"
            >
              ' '
            </button>
            <button
              @click="clearSql"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1 rounded transition-colors focus:outline-none ml-auto"
              title="清空输入框"
            >
              ✕ 清空
            </button>
          </div>

          <div class="relative">
            <textarea
              v-model="sql"
              rows="4"
              placeholder="输入 SQL 语句..."
              class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 pr-10 font-mono text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-y transition-colors"
              @keydown="onKeydown"
            ></textarea>
            <button
              @click="handleFavorite"
              @mousedown.prevent
              :disabled="favLoading"
              class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center rounded transition-colors z-10"
              :class="favLoading ? 'text-yellow-400 animate-pulse' : 'text-gray-500 hover:text-yellow-400 hover:bg-gray-700'"
              title="收藏当前 SQL"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
                />
              </svg>
            </button>
          </div>
        </section>

        <section class="mb-6">
          <button
            @click="executeSql"
            @mousedown.prevent
            :disabled="loading"
            class="w-full py-3 text-lg rounded-lg font-semibold transition-colors flex items-center justify-center gap-2"
            :class="loading ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white'"
          >
            <svg
              v-if="loading"
              class="animate-spin h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
            {{ loading ? '执行中...' : '执行' }}
          </button>
        </section>

        <section id="output-area" v-if="result">
          <div
            class="rounded-lg px-4 py-3 mb-4 text-sm"
            :class="result.success
          ? 'bg-green-900/50 border border-green-700 text-green-300'
          : 'bg-red-900/50 border border-red-700 text-red-300'"
          >
            <template v-if="result.success">
              <template
                v-if="result.columns && result.columns.length > 0 && result.out_params && result.out_params.length > 0"
              >
                查询成功，共返回 {{ result.rows.length }} 行，{{
                result.out_params.length }} 个 OUT 参数，耗时 {{
                result.duration_ms }} ms
              </template>
              <template v-else-if="result.columns && result.columns.length > 0">
                查询成功，耗时 {{ result.duration_ms }} ms，共 {{
                result.rows.length }} 行
              </template>
              <template
                v-else-if="result.out_params && result.out_params.length > 0"
              >
                执行成功，返回 {{ result.out_params.length }} 个 OUT 参数，耗时
                {{ result.duration_ms }} ms
              </template>
              <template v-else>
                执行成功，影响 {{ result.affected_rows }} 行，耗时 {{
                result.duration_ms }} ms
              </template>
            </template>
            <template v-else> {{ result.message }} </template>
          </div>

          <div
            v-if="result.success && result.affected_rows > 0 && (!result.columns || result.columns.length === 0)"
            class="text-yellow-400 font-semibold mb-4 text-sm"
          >
            影响行数：{{ result.affected_rows }} 行
          </div>

          <div
            v-if="result.columns && result.columns.length > 0"
            class="overflow-x-auto rounded-lg border border-gray-700 max-h-[60vh] overflow-y-auto"
          >
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-700">
                  <th
                    v-for="col in result.columns"
                    :key="col"
                    class="px-4 py-2 text-left font-bold whitespace-nowrap text-gray-200"
                  >
                    {{ col }}
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr
                  v-for="(row, index) in result.rows"
                  :key="index"
                  :class="index % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                >
                  <td
                    v-for="(cell, ci) in row"
                    :key="ci"
                    class="px-4 py-2 whitespace-nowrap"
                  >
                    <span v-if="cell === null" class="text-gray-500 italic"
                      >NULL</span
                    >
                    <span v-else>{{ cell }}</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div
            v-if="result.columns && result.columns.length > 0"
            class="flex gap-2 mt-2"
          >
            <button
              @click="copyAsMarkdown(result.columns, result.rows)"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
            >
              📋 复制 Markdown
            </button>
            <button
              @click="downloadCsv(result.columns, result.rows, 'query_result.csv')"
              @mousedown.prevent
              class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
            >
              ⬇️ 下载 CSV
            </button>
          </div>

          <div
            v-if="result.out_params && result.out_params.length > 0"
            class="mt-4"
          >
            <div class="text-sm font-semibold text-amber-400 mb-2">
              OUT 参数
            </div>
            <div class="overflow-x-auto rounded-lg border border-amber-800/50">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-amber-900/30">
                    <th
                      class="px-4 py-2 text-left font-bold whitespace-nowrap text-amber-300"
                    >
                      参数名
                    </th>
                    <th
                      class="px-4 py-2 text-left font-bold whitespace-nowrap text-amber-300"
                    >
                      值
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    v-for="(param, index) in result.out_params"
                    :key="index"
                    :class="index % 2 === 0 ? 'bg-gray-800' : 'bg-gray-800/50'"
                  >
                    <td class="px-4 py-2 whitespace-nowrap text-amber-200">
                      {{ param.name }}
                    </td>
                    <td class="px-4 py-2 whitespace-nowrap">
                      <span
                        v-if="param.value === null"
                        class="text-gray-500 italic"
                        >NULL</span
                      >
                      <span v-else>{{ param.value }}</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="flex gap-2 mt-2">
              <button
                @click="copyAsMarkdown(['参数名', '值'], result.out_params.map(p => [p.name, p.value]))"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                📋 复制 Markdown
              </button>
              <button
                @click="downloadCsv(['参数名', '值'], result.out_params.map(p => [p.name, p.value]), 'out_params.csv')"
                @mousedown.prevent
                class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded transition-colors inline-flex items-center gap-1"
              >
                ⬇️ 下载 CSV
              </button>
            </div>
          </div>
        </section>

        <section class="mt-6">
          <div
            class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden"
          >
            <div
              @click="randOpen = !randOpen"
              class="text-sm font-semibold text-gray-300 px-4 py-3 cursor-pointer select-none hover:bg-gray-700/50 transition-colors flex items-center justify-between"
            >
              <span>🎲 随机数生成器</span>
              <svg
                class="w-3 h-3 transition-transform"
                :class="{ 'rotate-180': randOpen }"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
            <div v-show="randOpen">
              <div class="flex gap-2 px-4 pb-3">
                <input
                  v-model="randMax"
                  type="number"
                  min="2"
                  placeholder="输入大于1的整数"
                  @keydown.enter="generateRandom"
                  class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-blue-500 transition-colors"
                />
                <button
                  @click="generateRandom"
                  @mousedown.prevent
                  class="bg-emerald-600 hover:bg-emerald-500 text-sm px-4 py-2 rounded font-semibold transition-colors whitespace-nowrap"
                >
                  生成
                </button>
              </div>
              <div v-if="randError" class="text-red-400 text-xs px-4 pb-2">
                {{ randError }}
              </div>
              <div v-if="randResult !== null">
                <div
                  class="text-center text-4xl font-bold text-emerald-400 py-4"
                >
                  {{ randResult }}
                </div>
                <div class="text-center text-xs text-gray-500 pb-3">
                  1 ~ {{ randMax }} 范围内的随机数
                </div>
              </div>
            </div>
          </div>
        </section>

        <div
          v-if="copyToast"
          class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50"
        >
          {{ copyToast }}
        </div>

        <div
          v-if="favToast"
          class="fixed bottom-4 left-1/2 -translate-x-1/2 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50"
          :class="{
          'bg-emerald-600': favToast.type === 'success',
          'bg-red-600': favToast.type === 'error',
          'bg-yellow-600': favToast.type === 'warn',
        }"
        >
          {{ favToast.text }}
        </div>

        <button
          v-if="isLoginMode"
          @click="doLogout"
          @mousedown.prevent
          class="fixed bottom-4 right-4 w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 border border-gray-700 text-gray-500 hover:text-red-400 hover:border-red-700 transition-colors shadow-lg z-40"
          title="退出登录"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
        </button>
      </template>
    </div>

    <script>
      const { createApp, ref, computed, nextTick } = Vue;

      createApp({
        setup() {
          const loginView = ref(true);
          const isLoginMode = ref(false);
          const loginHost = ref("127.0.0.1");
          const loginPort = ref("3306");
          const loginUser = ref("root");
          const loginPassword = ref("");
          const loginDb = ref("");
          const rememberLogin = ref(false);
          const showPassword = ref(false);
          const loginLoading = ref(false);
          const loginError = ref("");
          let authToken = null;

          function getToken() {
            if (authToken) return authToken;
            try {
              const t = localStorage.getItem("mwc_token");
              if (t) {
                authToken = t;
                return t;
              }
            } catch (e) {}
            return null;
          }

          function setToken(token) {
            authToken = token;
            try {
              localStorage.setItem("mwc_token", token);
            } catch (e) {}
          }

          function clearToken() {
            authToken = null;
            try {
              localStorage.removeItem("mwc_token");
            } catch (e) {}
          }

          function loadCredentials() {
            try {
              const raw = localStorage.getItem("mwc_credentials");
              if (!raw) return;
              const c = JSON.parse(raw);
              loginHost.value = c.host || "127.0.0.1";
              loginPort.value = c.port || "3306";
              loginUser.value = c.user || "root";
              loginPassword.value = c.password || "";
              loginDb.value = c.db || "";
              rememberLogin.value = true;
            } catch (e) {}
          }

          function saveCredentials() {
            try {
              localStorage.setItem(
                "mwc_credentials",
                JSON.stringify({
                  host: loginHost.value,
                  port: loginPort.value,
                  user: loginUser.value,
                  password: loginPassword.value,
                  db: loginDb.value,
                }),
              );
            } catch (e) {}
          }

          function clearCredentials() {
            try {
              localStorage.removeItem("mwc_credentials");
            } catch (e) {}
          }

          async function authedFetch(url, options = {}) {
            const token = getToken();
            if (token) {
              if (!options.headers) options.headers = {};
              options.headers["Authorization"] = "Bearer " + token;
            }
            const res = await fetch(url, options);
            if (res.status === 401 && isLoginMode.value) {
              clearToken();
              loginView.value = true;
              try {
                const errData = await res.clone().json();
                loginError.value = errData.detail || "会话已过期，请重新登录";
              } catch (e) {
                loginError.value = "会话已过期，请重新登录";
              }
            }
            return res;
          }

          async function checkAuth() {
            try {
              const res = await fetch("/api/auth-status");
              const data = await res.json();
              isLoginMode.value = data.require_login;
              if (!data.require_login) {
                loginView.value = false;
                loadFavorites();
                fetchDbInfo();
                loadTables();
                return;
              }
              if (data.authenticated && getToken()) {
                loginView.value = false;
                loadFavorites();
                fetchDbInfo();
                loadTables();
              } else {
                loadCredentials();
                loginView.value = true;
              }
            } catch (e) {
              loginView.value = false;
              loadFavorites();
              fetchDbInfo();
              loadTables();
            }
          }

          checkAuth();

          async function doLogin() {
            loginError.value = "";
            loginLoading.value = true;
            try {
              const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  host: loginHost.value || "127.0.0.1",
                  port: parseInt(loginPort.value) || 3306,
                  user: loginUser.value || "root",
                  password: loginPassword.value,
                  db: loginDb.value,
                }),
              });
              const data = await res.json();
              if (data.success) {
                setToken(data.token);
                if (rememberLogin.value) {
                  saveCredentials();
                } else {
                  clearCredentials();
                }
                loginView.value = false;
                fetchDbInfo();
                loadTables();
                loadFavorites();
              } else {
                loginError.value = data.message || "连接失败";
              }
            } catch (e) {
              loginError.value = "网络错误: " + e.message;
            } finally {
              loginLoading.value = false;
            }
          }

          async function doLogout() {
            try {
              const token = getToken();
              const headers = {};
              if (token) headers["Authorization"] = "Bearer " + token;
              await fetch("/api/logout", { method: "POST", headers });
            } catch (e) {}
            clearToken();
            if (!rememberLogin.value) {
              clearCredentials();
            }
            loginHost.value = "127.0.0.1";
            loginPort.value = "3306";
            loginUser.value = "root";
            loginPassword.value = "";
            loginDb.value = "";
            rememberLogin.value = false;
            loginView.value = true;
            loginError.value = "";
            currentDb.value = null;
            tableList.value = [];
            result.value = null;
            procList.value = [];
            procLoaded.value = false;
          }

          const sql = ref("");
          const loading = ref(false);
          const result = ref(null);
          const currentDb = ref(null);

          const favorites = ref([]);
          const favSearch = ref("");
          const favLoading = ref(false);
          const favToast = ref(null);
          const favNameDialog = ref(false);
          const favNameInput = ref("");
          const favPendingSql = ref("");
          const favValidationError = ref("");

          const procList = ref([]);
          const procSearch = ref("");
          const procLoading = ref(false);
          const procLoaded = ref(false);

          const pickerView = ref(false);

          const randMax = ref("");
          const randResult = ref(null);
          const randError = ref("");
          const randOpen = ref(true);

          const copyToast = ref("");

          const tableList = ref([]);
          const tablesLoading = ref(false);
          const tableListView = ref("list");
          const selectedTable = ref("");
          const tableDetailColumns = ref([]);
          const tableDetailRows = ref([]);
          const tableDetailLoading = ref(false);

          const filteredProcList = computed(() => {
            const keyword = procSearch.value.trim().toLowerCase();
            if (!keyword) return procList.value;
            return procList.value.filter((n) =>
              n.toLowerCase().includes(keyword),
            );
          });

          const filteredFavorites = computed(() => {
            const keyword = favSearch.value.trim().toLowerCase();
            if (!keyword) return favorites.value;
            return favorites.value.filter(
              (f) =>
                f.name.toLowerCase().includes(keyword) ||
                f.sql.toLowerCase().includes(keyword),
            );
          });

          const pickerFavFlex = computed(() => {
            const favCount = filteredFavorites.value.length;
            const procCount = filteredProcList.value.length;
            if (favCount === 0 && procCount === 0) return 1;
            return Math.max(favCount, 3);
          });

          const pickerProcFlex = computed(() => {
            const favCount = filteredFavorites.value.length;
            const procCount = filteredProcList.value.length;
            if (favCount === 0 && procCount === 0) return 1;
            return Math.max(procCount, 3);
          });

          async function loadTables() {
            tablesLoading.value = true;
            try {
              const res = await authedFetch("/api/tables");
              const data = await res.json();
              tableList.value = data.tables || [];
            } catch (e) {
              tableList.value = [];
            } finally {
              tablesLoading.value = false;
            }
          }

          async function openTableDetail(tableName) {
            selectedTable.value = tableName;
            tableListView.value = "detail";
            tableDetailLoading.value = true;
            tableDetailColumns.value = [];
            tableDetailRows.value = [];
            try {
              const res = await authedFetch(
                "/api/tables/" + encodeURIComponent(tableName) + "/desc",
              );
              const data = await res.json();
              if (data.success) {
                tableDetailColumns.value = data.columns || [];
                tableDetailRows.value = data.rows || [];
              }
            } catch (e) {
              tableDetailColumns.value = [];
              tableDetailRows.value = [];
            } finally {
              tableDetailLoading.value = false;
            }
          }

          function focusTextarea() {
            const ta = document.querySelector("textarea");
            if (!ta) return;
            ta.focus();
            const idx = sql.value.indexOf("<");
            if (idx >= 0) {
              requestAnimationFrame(() => {
                ta.selectionStart = idx;
                ta.selectionEnd = sql.value.indexOf(">", idx) + 1;
              });
            }
          }

          function fillSelect() {
            sql.value =
              "SELECT * FROM `" + selectedTable.value + "` WHERE <条件>;";
            focusTextarea();
          }

          function fillInsert() {
            const cols = tableDetailRows.value.map((r) => "`" + r[0] + "`");
            const vals = tableDetailRows.value.map(() => "<值>");
            sql.value =
              "INSERT INTO `" +
              selectedTable.value +
              "` (" +
              cols.join(", ") +
              ")\nVALUES (" +
              vals.join(", ") +
              ");";
            focusTextarea();
          }

          function fillUpdate() {
            const sets = tableDetailRows.value.map(
              (r) => "`" + r[0] + "` = <值>",
            );
            sql.value =
              "UPDATE `" +
              selectedTable.value +
              "` SET " +
              sets.join(", ") +
              "\nWHERE <条件>;";
            focusTextarea();
          }

          function fillDelete() {
            sql.value =
              "DELETE FROM `" + selectedTable.value + "` WHERE <条件>;";
            focusTextarea();
          }

          async function loadFavorites() {
            try {
              const res = await authedFetch("/api/favorites");
              const data = await res.json();
              favorites.value = data.favorites || [];
            } catch (e) {
              favorites.value = [];
            }
          }

          async function removeFavorite(id) {
            try {
              await authedFetch("/api/favorites/" + id, { method: "DELETE" });
              favorites.value = favorites.value.filter((f) => f.id !== id);
            } catch (e) {}
          }

          function showFavToast(text, type) {
            favToast.value = { text, type };
            setTimeout(() => {
              favToast.value = null;
            }, 2000);
          }

          async function handleFavorite() {
            const sqlStr = sql.value.trim();
            if (!sqlStr) {
              showFavToast("请先输入 SQL 语句", "warn");
              return;
            }
            favPendingSql.value = sqlStr;
            favNameInput.value = "";
            favValidationError.value = "";
            favNameDialog.value = true;
            nextTick(() => {
              const input =
                document.querySelector('[ref="favNameInputRef"]') ||
                document.querySelector(
                  '.bg-gray-800 input[placeholder="输入收藏命名..."]',
                );
              if (input) input.focus();
            });
          }

          async function confirmFavorite(force = false) {
            const name = favNameInput.value.trim();
            if (!name) return;
            favLoading.value = true;
            try {
              const res = await authedFetch("/api/favorites", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  name: name,
                  sql: favPendingSql.value,
                  force: force,
                }),
              });
              const data = await res.json();
              if (data.success) {
                favorites.value.unshift(data.favorite);
                favNameDialog.value = false;
                favValidationError.value = "";
                showFavToast("⭐ 收藏成功", "success");
              } else if (data.validation_error) {
                favValidationError.value = data.message || "SQL 校验未通过";
              } else {
                showFavToast(data.message || "收藏失败", "error");
              }
            } catch (e) {
              showFavToast("收藏请求失败", "error");
            } finally {
              favLoading.value = false;
            }
          }

          async function fetchDbInfo() {
            try {
              const res = await authedFetch("/api/info");
              const data = await res.json();
              currentDb.value = data.database || null;
            } catch (e) {
              currentDb.value = null;
            }
          }

          async function openPicker() {
            pickerView.value = true;
            if (!procLoaded.value) {
              await loadProcedures();
            }
          }

          function closePicker() {
            pickerView.value = false;
            favSearch.value = "";
            procSearch.value = "";
          }

          async function loadProcedures() {
            procLoading.value = true;
            try {
              const res = await authedFetch("/api/procedures");
              const data = await res.json();
              procList.value = data.procedures || [];
              procLoaded.value = true;
            } catch (e) {
              procList.value = [];
            } finally {
              procLoading.value = false;
            }
          }

          async function selectProcedure(name) {
            const ta = document.querySelector("textarea");
            if (ta) ta.focus();
            try {
              const res = await authedFetch(
                "/api/procedures/" + encodeURIComponent(name) + "/params",
              );
              const data = await res.json();
              const params = data.params || [];
              if (params.length === 0) {
                sql.value = "CALL " + name + "();";
              } else {
                const args = params.map((p) => {
                  if (p.direction === "OUT") return "@" + p.name + "_auto";
                  if (p.direction === "INOUT") return "<@" + p.name + "_auto>";
                  return "<" + p.name + ">";
                });
                sql.value = "CALL " + name + "(" + args.join(", ") + ");";
              }
            } catch (e) {
              sql.value = "CALL " + name + "();";
            }
            procSearch.value = "";
            if (sql.value.includes("<") && ta) {
              requestAnimationFrame(() => {
                const idx = sql.value.indexOf("<");
                ta.selectionStart = idx;
                ta.selectionEnd = sql.value.indexOf(">", idx) + 1;
              });
            } else if (ta) {
              ta.blur();
            }
          }

          async function selectProcedureFromPicker(name) {
            await selectProcedure(name);
            closePicker();
          }

          function generateRandom() {
            randResult.value = null;
            randError.value = "";
            const val = String(randMax.value).trim();
            if (!val || val === "") {
              randError.value = "请输入一个整数";
              return;
            }
            const num = Number(val);
            if (!Number.isInteger(num)) {
              randError.value = "请输入有效的整数";
              return;
            }
            if (num <= 1) {
              randError.value = "请输入大于1的整数";
              return;
            }
            randResult.value = Math.floor(Math.random() * num) + 1;
          }

          async function executeSql() {
            if (!sql.value.trim() || loading.value) return;

            loading.value = true;
            result.value = null;

            try {
              const response = await authedFetch("/api/execute", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ sql: sql.value.trim() }),
              });
              const data = await response.json();
              result.value = data;

              if (data.success) {
                loadTables();
                tableListView.value = "list";
                if (sql.value.trim().toUpperCase().startsWith("USE ")) {
                  fetchDbInfo();
                }
              }
            } catch (err) {
              result.value = {
                success: false,
                message: "网络错误: " + err.message,
                duration_ms: 0.0,
                columns: [],
                rows: [],
                affected_rows: 0,
                out_params: [],
              };
            } finally {
              loading.value = false;
              nextTick(() => {
                const el = document.getElementById("output-area");
                if (el) {
                  el.scrollIntoView({ behavior: "smooth", block: "start" });
                }
              });
            }
          }

          function insertTab() {
            const ta = document.querySelector("textarea");
            if (!ta) return;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const val = sql.value;
            sql.value = val.substring(0, start) + "\t" + val.substring(end);
            nextTick(() => {
              ta.selectionStart = ta.selectionEnd = start + 1;
              ta.focus();
            });
          }

          function insertQuote() {
            const ta = document.querySelector("textarea");
            if (!ta) return;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const val = sql.value;
            const inserted = "' '";
            sql.value = val.substring(0, start) + inserted + val.substring(end);
            nextTick(() => {
              ta.selectionStart = start + 1;
              ta.selectionEnd = start + 2;
              ta.focus();
            });
          }

          function clearSql() {
            sql.value = "";
          }

          function escapeCsvCell(cell) {
            if (cell === null || cell === undefined) return "";
            const str = String(cell);
            if (
              str.includes(",") ||
              str.includes('"') ||
              str.includes("\n") ||
              str.includes("\r")
            ) {
              return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
          }

          function fallbackCopyText(text) {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            ta.style.top = "-9999px";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.focus();
            ta.setSelectionRange(0, ta.value.length);
            let ok = false;
            try {
              ok = document.execCommand("copy");
            } catch (e) {
              ok = false;
            }
            document.body.removeChild(ta);
            return ok;
          }

          function copyAsMarkdown(columns, rows) {
            const header = "| " + columns.join(" | ") + " |";
            const separator =
              "| " + columns.map(() => "---").join(" | ") + " |";
            const body = rows
              .map(
                (row) =>
                  "| " +
                  row
                    .map((cell) => (cell === null ? "NULL" : String(cell)))
                    .join(" | ") +
                  " |",
              )
              .join("\n");
            const md = header + "\n" + separator + "\n" + body;
            if (navigator.clipboard && window.isSecureContext) {
              navigator.clipboard
                .writeText(md)
                .then(() => {
                  copyToast.value = "已复制到剪贴板";
                  setTimeout(() => {
                    copyToast.value = "";
                  }, 1500);
                })
                .catch(() => {
                  const ok = fallbackCopyText(md);
                  copyToast.value = ok ? "已复制到剪贴板" : "复制失败";
                  setTimeout(() => {
                    copyToast.value = "";
                  }, 1500);
                });
            } else {
              const ok = fallbackCopyText(md);
              copyToast.value = ok ? "已复制到剪贴板" : "复制失败";
              setTimeout(() => {
                copyToast.value = "";
              }, 1500);
            }
          }

          function downloadCsv(columns, rows, filename) {
            const header = columns.map(escapeCsvCell).join(",");
            const body = rows
              .map((row) => row.map(escapeCsvCell).join(","))
              .join("\n");
            const csv = "\uFEFF" + header + "\n" + body;
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
          }

          function onKeydown(e) {
            if (e.key === "Tab") {
              e.preventDefault();
              insertTab();
              return;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
              e.preventDefault();
              executeSql();
            }
          }

          return {
            loginView,
            isLoginMode,
            loginHost,
            loginPort,
            loginUser,
            loginPassword,
            loginDb,
            rememberLogin,
            showPassword,
            loginLoading,
            loginError,
            doLogin,
            doLogout,
            sql,
            loading,
            result,
            currentDb,
            favorites,
            favSearch,
            favLoading,
            favToast,
            favNameDialog,
            favNameInput,
            favPendingSql,
            favValidationError,
            filteredFavorites,
            pickerView,
            pickerFavFlex,
            pickerProcFlex,
            openPicker,
            closePicker,
            handleFavorite,
            confirmFavorite,
            removeFavorite,
            insertTab,
            insertQuote,
            executeSql,
            onKeydown,
            procList,
            procSearch,
            procLoading,
            filteredProcList,
            selectProcedure,
            selectProcedureFromPicker,
            randMax,
            randResult,
            randError,
            randOpen,
            generateRandom,
            clearSql,
            copyAsMarkdown,
            downloadCsv,
            copyToast,
            tableList,
            tablesLoading,
            tableListView,
            selectedTable,
            tableDetailColumns,
            tableDetailRows,
            tableDetailLoading,
            openTableDetail,
            fillSelect,
            fillInsert,
            fillUpdate,
            fillDelete,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
